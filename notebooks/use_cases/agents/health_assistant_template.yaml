      index: "4.2"
    - id: evaluation_results
      title: Evaluation Results
      index_only: true
      parent_section: agent_evaluation
      sections:
        - id: metric_summary
          title: Metric Summary
          guidelines:
            - Summarize the main results across evaluation metrics, highlighting
              central tendencies, notable variation, and any metrics that
              indicate strong or weak performance.
            - Call out the most important takeaways from the scored traces so
              reviewers can quickly understand the overall evaluation picture.
          parent_section: evaluation_results
          index_only: true
          contents:
            - content_type: test
              content_id: custom_tests.AgentEvaluationMetricSummary
            - content_type: test
              content_id: custom_tests.AgentEvaluationMetricScoreDistributions
          index: 4.3.1
        - id: breach_statistics
          title: Breach Statistics
          guidelines:
            - Describe the frequency and distribution of policy, safety, or
              quality breaches observed in the evaluation results.
            - Highlight which categories of breaches are most common or most
              important and explain what they imply for risk review.
          parent_section: evaluation_results
          index_only: true
          contents:
            - content_type: test
              content_id: custom_tests.AgentEvaluationBreachSummary
            - content_type: test
              content_id: custom_tests.AgentEvaluationCategoryBreachSummary
          index: 4.3.2
        - id: error_analysis
          title: Error Analysis
          guidelines:
            - Analyze representative low-scoring or problematic traces to
              explain where the health assistant fails and what patterns appear
              across those failures.
            - Distinguish between different types of issues, such as retrieval,
              routing, grounding, bias, or harmful-response problems, and note
              any recurring themes.
          parent_section: evaluation_results
          index_only: true
          contents:
            - content_type: test
              content_id: custom_tests.AgentEvaluationLowScoringTraces
          index: 4.3.3
      index: "4.3"
