          content_id: custom_tests.AgentEvaluationDatasetOverview
        - content_type: test
          content_id: custom_tests.AgentEvaluationScenarioCoverage
      index: "4.1"
    - id: metrics_description
      title: Metrics Description
      guidelines:
        - Document the metrics used to evaluate the agent, including what each
          metric measures, why it matters, and how it should be interpreted.
        - Explain how metric scores are assigned to traces, including any use of
          automated scorers, rubric-based evaluation, or thresholding logic.
      parent_section: agent_evaluation
      index_only: true
      contents:
        - content_type: text
          content_id: afb04e60-e28d-4a9e-9745-50d532fb79ad
