- id: agent_evaluation
  title: Agent Evaluation
  index_only: true
  sections:
    - id: evaluation_dataset
      title: Evaluation Dataset
      guidelines:
        - Describe the dataset used for agent evaluation, including its size,
          composition, scenario coverage, and whether it contains synthetic,
          curated, or production-derived traces.
        - Explain why the dataset is appropriate for evaluating the health
          assistant and note any important gaps, biases, or constraints in the
          evaluation set.
      parent_section: agent_evaluation
      index_only: true
      contents:
