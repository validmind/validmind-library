      title: Purpose and Scope
      guidelines:
        - Define the intended use of the health assistant, including target
          users, supported tasks, and the business or operational context in
          which it is meant to be used.
        - Clarify what is in scope and out of scope for the agent, including any
          restrictions on use cases, decision authority, or reliance on human
